
esp32:
  base_url: "http://192.168.101.123"

processing:
  interval_sec: 10
  retry_backoff_sec: 5
  image_path: "/tmp/water_raw.jpg"
  image_timeout: 8.0
  save_debug_overlays: true
  debug_dir: "~/watermeter/debug"
  debug_keep_latest_only: true
  quiet_hours:
    enabled: true
    start: "00:00"      # inclusive
    end:   "07:00"      # exclusive
    interval_sec: 60

overlay:
  font_scale: 1.0           # ~relative to a 480-px tall frame; try 1.0–1.6
  font_thickness: 2         # main text thickness
  outline_thickness: 6      # black outline behind text (>= font_thickness)
  line_thickness: 1         # rectangle thickness around ROIs
  publish_mqtt: true
  camera_topic: "home/watermeter/debug/overlay"   # image topic
  camera_name: "Water Meter Overlay"
  camera_unique_id: "water_overlay_macocr"
  jpeg_quality: 85                                 # optional re-encode before publish
  
digits:
  count: 5
  per_digit_inset: 0.10         # shrink each digit box inside the window
  rolling_threshold_up: 0.92
  rolling_threshold_down: 0.08

postproc:
  monotonic_epsilon: 0.0
  big_jump_guard: 2.0

mqtt:
  host: "192.168.1.23"
  port: 1883
  username: null
  password: null
  topic: "home/watermeter"
  client_id: "water-ocr-mac"
  ha_discovery_prefix: "homeassistant"

paths:
  ocr_bin: "~/watermeter/bin/ocr"
  state_path: "~/watermeter/state.json"
  log_path:   "~/watermeter/watermeter.log"

alignment:
  enabled: true
  reference_path: "~/watermeter/reference.jpg"
  use_mask: true
  anchor_rois:
    - [0.18, 0.00, 0.64, 0.28]
    - [0.05, 0.28, 0.30, 0.22]
    - [0.70, 0.24, 0.25, 0.25]
  nfeatures: 1200
  ratio_test: 0.75
  min_matches: 40
  ransac_thresh_px: 3.0
  max_scale_change: 0.08
  max_rotation_deg: 15.0
  warp_mode: "similarity"
  write_debug_aligned: true

# Auto-centering: automatically detects and centers dials for improved accuracy
auto_centering:
  enabled: true                    # Enable automatic dial center detection and ROI adjustment
  smoothing_alpha: 0.3             # ROI adjustment speed (0.1=stable/slow, 0.5=fast/responsive)
  min_confidence_threshold: 0.4    # Log warning if dial detection confidence drops below this

rois:
  digits: [0.307, 0.270, 0.330, 0.110]

  dials:
    - name: dial_0_1        # ×0.1 m³ (rightmost)
      roi: [0.6370, 0.5892, 0.131, 0.174]
      factor: 0.1
      rotation: "cw"
      zero_angle_deg: -90

    - name: dial_0_01       # ×0.01 m³
      roi: [0.5444, 0.7273, 0.132, 0.174]
      factor: 0.01
      rotation: "cw"
      zero_angle_deg: -90

    - name: dial_0_001      # ×0.001 m³
      roi: [0.4137, 0.7763, 0.130, 0.173]
      factor: 0.001
      rotation: "cw"
      zero_angle_deg: -90

    - name: dial_0_0001     # ×0.0001 m³ (leftmost)
      roi: [0.2439, 0.6675, 0.134, 0.173]
      factor: 0.0001
      rotation: "cw"
      zero_angle_deg: -90

# --- digital meter example (uncomment + set meter.type: digital to enable) ---
# For fully-digital LCD meters (e.g. Qalcosonic W1). The display has two text
# lines: total consumption (m³) and instant flow (m³/h). No dials. See
# docs/CONFIGURATION.md § "Digital meter" for the full swap procedure.
#
# The flow line is OPTIONAL — some installs can't align both lines cleanly
# because of flash glare on part of the LCD. Calibrating only `total` makes
# the service publish just the total and the delta-computed rate; `flow_m3h`
# and its HA sensor are suppressed automatically.
#
# meter:
#   type: digital                 # default "mechanical"
#
# processing:
#   interval_sec: 15              # retry budget fits inside 15s (see below)
#
# rois:
#   digital:
#     # Configure ONE of the two reading modes below.
#     #
#     # Single-ROI mode — one rectangle covers the whole total line:
#     total: [0.10, 0.25, 0.80, 0.18]     # line with 6 int + 3 decimal digits
#     #
#     # Split-ROI mode — two rectangles, one per sub-line. Needed for LCDs
#     # whose fractional digits are visibly smaller than the integer digits
#     # (Vision tends to drop the smaller glyphs when both are captured in a
#     # single wide ROI). When BOTH keys below are set, the pipeline OCRs
#     # them separately and joins with "." before parsing — `total` above
#     # becomes optional and can be removed.
#     # total_int:  [0.10, 0.25, 0.48, 0.18]
#     # total_frac: [0.58, 0.30, 0.22, 0.14]
#     flow:  [0.25, 0.50, 0.55, 0.15]   # optional — line with "XX.YYY m³/h"; omit if flash glare hides it
#
# digital:
#   # Regex must match Vision's output with or without an auto-detected decimal —
#   # the small baseline dot on many 7-segment LCDs is routinely dropped by OCR.
#   # Both parsers inject "." at position -3 when the regex matches but no dot
#   # is present, so a dotless read like "00000" is accepted as "00.000".
#   total_regex: "^\\d{6}\\.?\\d{3}$"
#   flow_regex:  "^\\d{2,5}\\.?\\d{3}$"
#   # Optional OCR contrast preprocessing. "none" (default) leaves the captured
#   # frame untouched. "clahe" applies Contrast Limited Adaptive Histogram
#   # Equalization — enable if Vision consistently drops thin glyphs (e.g. a
#   # narrow "1") that are clearly visible in the debug overlay.
#   ocr_preprocess: "none"
#   # Optional per-digit OCR. When a digit_count is > 0 for a region, that
#   # region's base ROI is subdivided into that many equal sub-ROIs and each
#   # digit is recognized independently (one Swift call per digit). Slower
#   # but immune to line-recognition failures on small 7-segment glyphs
#   # (narrow "1"s dropped as noise, small digits mis-rotated 180°, etc.).
#   # 0 (default) = line OCR for that region (original behaviour).
#   total_int_digit_count: 0     # e.g. 6 for a 6-digit integer segment
#   total_frac_digit_count: 0    # e.g. 3 for a 3-digit fractional segment
#   flow_digit_count: 0          # e.g. 5 for "XX.YYY"
#   per_digit_inset: 0.10        # shrink each sub-ROI inward to avoid bleed
#   # When true (default), per-digit mode first tries to auto-detect each
#   # digit's bounding box inside the outer ROI via vertical projection of
#   # the binarized crop. Self-corrects minor calibration offsets. Falls
#   # back to equal subdivision if detection finds the wrong digit count
#   # (busy background, merged digits, etc.). Set false to always use
#   # equal subdivision.
#   per_digit_auto_detect: true
#   max_retries: 2               # extra captures per cycle if wrong view detected
#   retry_delay_sec: 5.5         # > longest diag-view dwell (5s) so retries phase-cross
#   min_digits: 6                # cheap-fail bar for diagnostic screens
